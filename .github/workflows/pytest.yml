name: QA Automated Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pytest requests playwright pytest-playwright

      - name: Install Playwright browsers
        run: playwright install

      - name: Run pytest
        run: pytest -v
